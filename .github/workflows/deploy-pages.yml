name: Deploy to GitHub Pages

# Builds the plugin and publishes it to GitHub Pages so it can be viewed in a
# browser (demo data shows automatically) and used as the plugin URL in Sigma.
# Project Pages URL: https://ysigma.github.io/Sigma-Plugins/

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    # Guard: only ever publish from `main`. GitHub Pages is a single shared site
    # for the whole repo, so a manual run (workflow_dispatch) from any other
    # branch would otherwise overwrite the production site. Skip every ref but
    # main. (For belt-and-braces, also restrict the `github-pages` environment's
    # deployment branches to `main` in repo Settings → Environments.)
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    if: github.ref == 'refs/heads/main'
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
